spring.application.name=music

#turn off banner
spring.main.banner-mode=off

#reduce logging level to warn
logging.level.root=warn

#connect to MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/music?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

#path
server.servlet.context-path=/api

# Audio upload storage
app.audio.upload-dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

#Spring Security temp
spring.security.user.name=admin
spring.security.user.password=123456

# Read content in file application-secret.properties
spring.profiles.include=secret